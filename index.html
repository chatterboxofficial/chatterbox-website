<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatterBox AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
text-align:center;
max-width:700px;
padding:20px;
}

.logo{
font-size:60px;
margin-bottom:15px;
}

h1{
font-size:50px;
margin-bottom:15px;
background:linear-gradient(90deg,#00e5ff,#7c3aed);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
font-size:18px;
color:#cbd5e1;
margin-bottom:30px;
line-height:1.6;
}

button{
background:linear-gradient(90deg,#00e5ff,#7c3aed);
border:none;
padding:15px 35px;
font-size:18px;
font-weight:bold;
border-radius:30px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.credit{
position:fixed;
bottom:15px;
right:20px;
font-size:13px;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🤖</div>

<h1>ChatterBox AI</h1>

<p>
The next generation AI assistant designed to answer questions,
generate ideas, and help you work smarter.
</p>

<button onclick="alert('ChatterBox AI Launching Soon 🚀')">
Start Chat
</button>

</div>

<div class="credit">
✨ AI Crafted by Aniket
</div>

</body>
</html>
