<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatterbox AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#0b1020;
color:white;
height:100vh;
overflow:hidden;
}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#111827;
padding:20px;
transition:.3s;
z-index:999;
border-right:1px solid #1f2937;
}

.sidebar.active{
left:0;
}

.menu-btn{
position:fixed;
top:15px;
left:15px;
background:none;
border:none;
color:white;
font-size:24px;
cursor:pointer;
z-index:1000;
}

.header{
height:70px;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
border-bottom:1px solid #1f2937;
}

.header img{
width:42px;
height:42px;
border-radius:50%;
margin-right:10px;
}

.chat-window{
height:calc(100vh - 150px);
overflow-y:auto;
padding:20px;
padding-bottom:120px;
}

.welcome{
text-align:center;
margin-top:50px;
}

.welcome img{
width:120px;
height:120px;
border-radius:50%;
box-shadow:0 0 25px rgba(34,197,94,.5);
margin-bottom:20px;
}

.welcome h1{
font-size:40px;
margin-bottom:10px;
}

.welcome p{
color:#94a3b8;
}

.message{
display:flex;
margin:15px 0;
}

.user{
justify-content:flex-end;
}

.ai{
justify-content:flex-start;
}

.bubble{
max-width:75%;
padding:15px;
border-radius:20px;
word-wrap:break-word;
}

.user .bubble{
background:#2563eb;
}

.ai .bubble{
background:#1e293b;
display:flex;
gap:10px;
align-items:flex-start;
}

.ai-logo{
width:30px;
height:30px;
border-radius:50%;
}

.input-area{
position:fixed;
bottom:0;
width:100%;
padding:15px;
background:#0f172a;
border-top:1px solid #1f2937;
}

.input-box{
max-width:900px;
margin:auto;
display:flex;
gap:10px;
}

input{
flex:1;
padding:16px;
border:none;
outline:none;
border-radius:30px;
background:#1e293b;
color:white;
}

.send-btn{
padding:16px 24px;
border:none;
border-radius:30px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">
<h2>Chatterbox AI</h2>
<br>
<p>Think • Create • Explore</p>
</div>

<div class="header">
<img src="/logo.png">
<h2>Chatterbox AI</h2>
</div>

<div class="chat-window" id="chat-window">

<div class="welcome" id="welcome">
<img src="/logo.png">
<h1>Chatterbox AI</h1>
<p>Think • Create • Explore</p>
<br>
<p>Feel free to ask anything.</p>
</div>

</div>

<div class="input-area">
<div class="input-box">
<input id="userInput" placeholder="Message Chatterbox AI...">
<button class="send-btn" onclick="send()">Send</button>
</div>
</div>

<script>

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

async function send(){

let input=document.getElementById("userInput");

if(!input.value.trim()) return;

document.getElementById("welcome")?.remove();

let chat=document.getElementById("chat-window");

chat.innerHTML += `
<div class="message user">
<div class="bubble">${input.value}</div>
</div>
`;

let text=input.value;
input.value="";

try{

let response=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

let data=await response.json();

chat.innerHTML += `
<div class="message ai">
<div class="bubble">
<img src="/logo.png" class="ai-logo">
<div>${data.reply}</div>
</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;

}catch(e){

chat.innerHTML += `
<div class="message ai">
<div class="bubble">
<img src="/logo.png" class="ai-logo">
<div>Connection Error</div>
</div>
</div>
`;

}

}

document.getElementById("userInput")
.addEventListener("keypress",function(e){
if(e.key==="Enter"){
send();
}
});

</script>

</body>
</html>
