<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chatterbox AI</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; }
        #chat-window { height: 80vh; overflow-y: auto; padding: 20px; }
        .input-area { position: fixed; bottom: 20px; width: 100%; display: flex; padding: 0 10px; }
        input { flex: 1; padding: 15px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; }
        button { padding: 10px 20px; border-radius: 25px; margin-left: 10px; background: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything...">
        <button onclick="send()">Send</button>
    </div>
    <script>
        // Naam set karna
        if(!localStorage.getItem('userName')) {
            localStorage.setItem('userName', prompt("Enter your name:"));
        }
        async function send() {
            let input = document.getElementById('userInput');
            let chat = document.getElementById('chat-window');
            if(!input.value) return;
            chat.innerHTML += `<div><b>You:</b> ${input.value}</div>`;
            let res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: input.value, name: localStorage.getItem('userName') })
            });
            let data = await res.json();
            chat.innerHTML += `<div><b>AI:</b> ${data.reply}</div>`;
            input.value = '';
        }
    </script>
</body>
</html>
