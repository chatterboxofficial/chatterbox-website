<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatterbox AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0f19;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
height:70px;
display:flex;
align-items:center;
justify-content:center;
background:#111827;
border-bottom:1px solid #1f2937;
position:relative;
}

.header img{
width:45px;
height:45px;
border-radius:50%;
margin-right:10px;
}

.header h2{
font-size:22px;
}

#chat-window{
flex:1;
overflow-y:auto;
padding:20px;
max-width:900px;
width:100%;
margin:auto;
}

.message{
margin:12px 0;
display:flex;
}

.user{
justify-content:flex-end;
}

.ai{
justify-content:flex-start;
}

.bubble{
max-width:80%;
padding:14px;
border-radius:18px;
word-wrap:break-word;
}

.user .bubble{
background:#2563eb;
color:white;
}

.ai .bubble{
background:#1f2937;
border:1px solid #374151;
display:flex;
align-items:flex-start;
gap:10px;
}

.ai-logo{
width:28px;
height:28px;
border-radius:50%;
}

.input-area{
padding:15px;
background:#111827;
border-top:1px solid #1f2937;
}

.input-box{
max-width:900px;
margin:auto;
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border:none;
outline:none;
border-radius:30px;
background:#1f2937;
color:white;
font-size:16px;
}

button{
padding:14px 25px;
border:none;
border-radius:30px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.welcome{
text-align:center;
margin-top:50px;
}

.welcome img{
width:120px;
height:120px;
border-radius:50%;
margin-bottom:15px;
box-shadow:0 0 25px rgba(34,197,94,.4);
}
</style>
</head>

<body>

<div class="header">
<img src="/logo.png">
<h2>Chatterbox AI</h2>
</div>

<div id="chat-window">

<div class="welcome">
<img src="/logo.png">
<h1>Welcome to Chatterbox AI</h1>
<p>Your Professional AI Assistant</p>
</div>

</div>

<div class="input-area">
<div class="input-box">
<input type="text" id="userInput" placeholder="Ask Chatterbox AI...">
<button onclick="send()">Send</button>
</div>
</div>

<script>

let name = localStorage.getItem("userName");

if(!name){
name = prompt("Enter Your Name");
localStorage.setItem("userName",name);
}

async function send(){

let input=document.getElementById("userInput");

if(!input.value.trim()) return;

let chat=document.getElementById("chat-window");

chat.innerHTML += `
<div class="message user">
<div class="bubble">
${input.value}
</div>
</div>
`;

let userMessage=input.value;

input.value="";

chat.scrollTop=chat.scrollHeight;

try{

let res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:userMessage,
name:name
})
});

let data=await res.json();

chat.innerHTML += `
<div class="message ai">
<div class="bubble">
<img src="/logo.png" class="ai-logo">
<div>${data.reply}</div>
</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;

}catch(err){

chat.innerHTML += `
<div class="message ai">
<div class="bubble">
<img src="/logo.png" class="ai-logo">
<div>Server Error</div>
</div>
</div>
`;

}

}

document.getElementById("userInput")
.addEventListener("keypress",function(e){
if(e.key==="Enter"){
send();
}
});

</script>

</body>
</html>
