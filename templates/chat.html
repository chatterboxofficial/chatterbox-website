<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatterbox AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1020;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
height:70px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
border-bottom:1px solid #1f2937;
background:#0f172a;
}

.logo-small{
width:42px;
height:42px;
border-radius:50%;
margin-right:10px;
}

.menu-btn{
position:absolute;
left:15px;
font-size:24px;
cursor:pointer;
background:none;
border:none;
color:white;
}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#111827;
padding:20px;
transition:.3s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar h2{
margin-bottom:20px;
}

.chat-container{
flex:1;
overflow-y:auto;
padding:20px;
padding-bottom:120px;
}

.welcome{
text-align:center;
margin-top:40px;
}

.welcome img{
width:120px;
height:120px;
border-radius:50%;
box-shadow:0 0 30px rgba(34,197,94,.5);
margin-bottom:20px;
}

.welcome h1{
font-size:40px;
margin-bottom:10px;
}

.welcome p{
color:#9ca3af;
font-size:18px;
}

.message{
display:flex;
margin:15px 0;
}

.user{
justify-content:flex-end;
}

.ai{
justify-content:flex-start;
}

.bubble{
max-width:75%;
padding:15px;
border-radius:20px;
font-size:18px;
word-wrap:break-word;
}

.user .bubble{
background:#2563eb;
}

.ai .bubble{
background:#1e293b;
display:flex;
align-items:flex-start;
gap:10px;
}

.ai-logo{
width:32px;
height:32px;
border-radius:50%;
flex-shrink:0;
}

.input-area{
position:fixed;
bottom:0;
width:100%;
padding:15px;
background:#0f172a;
border-top:1px solid #1f2937;
}

.input-box{
max-width:900px;
margin:auto;
display:flex;
gap:10px;
}

input{
flex:1;
padding:18px;
border:none;
outline:none;
border-radius:30px;
background:#1e293b;
color:white;
font-size:16px;
}

button.send{
padding:15px 25px;
border:none;
border-radius:30px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button.send:hover{
background:#16a34a;
}

</style>

</head>

<body>

<div class="sidebar" id="sidebar">
<h2>Chatterbox AI</h2>
<p>Think • Create • Explore</p>
</div>

<div class="header">
<button class="menu-btn" onclick="toggleSidebar()">☰</button>
<img src="/static/logo.png" class="logo-small">
<h2>Chatterbox AI</h2>
</div>

<div class="chat-container" id="chat-window">

<div class="welcome" id="welcome">
<img src="/static/logo.png">
<h1>Chatterbox AI</h1>
<p>Think • Create • Explore</p>
<br>
<p>Feel free to ask anything.</p>
</div>

</div>

<div class="input-area">
<div class="input-box">
<input id="userInput" placeholder="Message Chatterbox AI...">
<button class="send" onclick="send()">Send</button>
</div>
</div>

<script>

let name=localStorage.getItem("userName");

if(!name){
name=prompt("Enter Your Name");
localStorage.setItem("userName",name);
}

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

async function send(){

let input=document.getElementById("userInput");

if(!input.value.trim()) return;

document.getElementById("welcome")?.remove();

let chat=document.getElementById("chat-window");

chat.innerHTML+=`
<div class="message user">
<div class="bubble">${input.value}</div>
</div>
`;

let userMessage=input.value;

input.value="";

chat.scrollTop=chat.scrollHeight;

try{

let res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:userMessage
})
});

let data=await res.json();

chat.innerHTML+=`
<div class="message ai">
<div class="bubble">
<img src="/static/logo.png" class="ai-logo">
<div>${data.reply}</div>
</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;

}catch(err){

chat.innerHTML+=`
<div class="message ai">
<div class="bubble">
<img src="/static/logo.png" class="ai-logo">
<div>Connection Error.</div>
</div>
</div>
`;

}

}

</script>

</body>
</html>
