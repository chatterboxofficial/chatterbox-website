<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chatterbox AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        #sidebar { position: absolute; left: -280px; top: 0; width: 280px; height: 100%; background: #0a0a0a; padding: 20px; transition: 0.3s; z-index: 2000; border-right: 1px solid #1a1a1a; }
        #sidebar.open { left: 0; }
        .main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        .header { padding: 15px; }
        #chat-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 100px; overflow-y: auto; }
        .brand-box { text-align: center; }
        .brand-logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #1a1a1a; }
        #chat-messages { display: none; width: 100%; max-width: 600px; padding: 20px; }
        .msg { padding: 12px; margin-bottom: 15px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
        .user { align-self: flex-end; background: #18181b; }
        .ai { align-self: flex-start; display: flex; gap: 10px; }
        .input-box { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; padding: 0 15px; }
        .input-field { width: 100%; max-width: 600px; background: #0a0a0a; border: 1px solid #27272a; padding: 12px 20px; border-radius: 50px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: none; border: none; color: white; outline: none; }
        .send-btn { background: #fff; color: #000; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #fff; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="sidebar">
        <div style="font-weight:bold; margin-bottom:20px;">Chatterbox</div>
        <div onclick="location.reload()" style="cursor:pointer; color:#71717a;">+ New Session</div>
    </div>
    <div class="main">
        <div class="header">
            <button style="background:none; border:none; color:white; cursor:pointer;" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fa fa-bars"></i></button>
        </div>
        <div id="chat-container">
            <div class="brand-box" id="welcome-screen">
                <img src="logo.png" class="brand-logo" onerror="this.style.display='none'">
                <div style="font-size:1.5rem; font-weight:700;">Chatterbox AI</div>
                <div style="color:#52525b; margin-top:10px;">Feel free to ask.</div>
            </div>
            <div id="chat-messages"></div>
        </div>
        <div class="input-box">
            <div class="input-field">
                <input type="text" id="userInput" placeholder="Ask anything...">
                <button class="send-btn" onclick="send()"><i class="fa fa-arrow-up"></i></button>
            </div>
        </div>
    </div>
    <script>
        async function send() {
            let input = document.getElementById('userInput'), chat = document.getElementById('chat-messages'), welcome = document.getElementById('welcome-screen');
            if(!input.value) return;
            welcome.style.display = 'none'; chat.style.display = 'block';
            chat.innerHTML += `<div class="msg user">${input.value}</div>`;
            let msg = input.value; input.value = '';
            let res = await fetch('/chat', { method: 'POST', body: JSON.stringify({ message: msg }), headers: {'Content-Type': 'application/json'} });
            let data = await res.json();
            chat.innerHTML += `<div class="msg ai"><div>${data.reply}<span class="cursor"></span></div></div>`;
        }
    </script>
</body>
</html>
