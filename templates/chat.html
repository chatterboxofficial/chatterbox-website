<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatterbox AI</title>
</head>

<body>

<h1>Chatterbox AI</h1>

<div id="chat-window"></div>

<div id="typing" style="display:none;">
Typing...
</div>

<input type="text" id="userInput" placeholder="Type message">
<button onclick="send()">Send</button>

<script>
async function send() {

let input = document.getElementById("userInput");

if (!input.value.trim()) return;

let chat = document.getElementById("chat-window");

chat.innerHTML += "<p><b>You:</b> " + input.value + "</p>";

let text = input.value;
input.value = "";

document.getElementById("typing").style.display = "block";

try {

let response = await fetch("/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
message: text
})
});

let data = await response.json();

document.getElementById("typing").style.display = "none";

chat.innerHTML += "<p><b>AI:</b> " + data.reply + "</p>";

} catch(e) {

document.getElementById("typing").style.display = "none";

chat.innerHTML += "<p><b>Connection Error</b></p>";

}

chat.scrollTop = chat.scrollHeight;
}

document.getElementById("userInput")
.addEventListener("keypress", function(e) {
if (e.key === "Enter") {
send();
}
});
</script>

</body>
</html>
