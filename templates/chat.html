<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta }

input{
flex:1;
padding:16px;
border:none;
outline:none;
border-radius:30px;
background:#1e293b;
color:white;
}

.send-btn{
padding:16px 24px;
border:none;
border-radius:30px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">
<h2>Chatterbox AI</h2>
<br>
<p>Think • Create • Explore</p>
</div>

<div class="header">
<img src="/logo.png">
<h2>Chatterbox AI</h2>
</div>

<div class="chat-window" id="chat-window">

<div class="welcome" id="welcome">
<img src="/logo.png">
<h1>Chatterbox AI</h1>
<p>Think • Create • Explore</p>
<br>
<p>Feel free to ask anything.</p>
</div>

</div>

<div class="input-area">
<div class="input-box">
<input id="userInput" placeholder="Message Chatterbox AI...">
<button class="send-btn" onclick="send()">Send</button>
</div>
</div>

<script>

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

async function send(){

let input=document.getElementById("userInput");

if(!input.value.trim()) return;

document.getElementById("welcome")?.remove();

let chat=document.getElementById("chat-window");

chat.innerHTML += `
<div class="message user">
<div class="bubble">${input.value}</div>
</div>
`;

let text=input.value;
input.value="";

try{

let response=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

let data=await response.json();

chat.innerHTML += `
<div class="message ai">
<div class="bubble">
<img src="/logo.png" class="ai-logo">
<div>${data.reply}</div>
</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;

}catch(e){

chat.innerHTML += `
<div class="message ai">
<div class="bubble">
<img src="/logo.png" class="ai-logo">
<div>Connection Error</div>
</div>
</div>
`;

}

}

document.getElementById("userInput")
.addEventListener("keypress",function(e){
if(e.key==="Enter"){
send();
}
});

</script>

</body>
</html>
