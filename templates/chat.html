<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatterbox AI</title>
    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #111; padding: 20px; border-right: 1px solid #333; }
        #content-area { flex: 1; display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding: 20px; }
        .logo { width: 80px; border-radius: 50%; margin-top: 50px; }
        .msg { width: 100%; max-width: 600px; margin: 10px 0; padding: 15px; border-radius: 10px; }
        .user { background: #2f2f2f; align-self: flex-end; }
        .ai { background: #1a1a1a; border-left: 4px solid #19c37d; }
        #input-container { padding: 20px; background: #0f0f0f; display: flex; justify-content: center; position: fixed; bottom: 0; width: 100%; }
        .input-wrapper { width: 100%; max-width: 700px; display: flex; background: #2f2f2f; border-radius: 30px; padding: 10px 20px; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        .cursor { animation: blink 1s infinite; border-left: 2px solid white; margin-left: 5px; }
        @keyframes blink { 50% { opacity: 0; } }
        button { background: #19c37d; border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="sidebar"><h3>Chatterbox AI</h3><p>Welcome, <span id="uName"></span></p></div>
    <div id="content-area">
        <img src="/logo.png" class="logo">
        <h1>Chatterbox AI</h1>
        <div id="chat-window" style="width: 100%; max-width: 600px;"></div>
    </div>
    <div id="input-container">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ask Chatterbox AI...">
            <span class="cursor"></span>
            <button onclick="send()">Send</button>
        </div>
    </div>
    <script>
        let name = localStorage.getItem('userName') || prompt("Enter your name:");
        localStorage.setItem('userName', name);
        document.getElementById('uName').innerText = name;
        async function send() {
            let input = document.getElementById('userInput');
            if(!input.value) return;
            document.getElementById('chat-window').innerHTML += `<div class="msg user"><b>You:</b> ${input.value}</div>`;
            let res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: input.value, name: name })
            });
            let data = await res.json();
            document.getElementById('chat-window').innerHTML += `<div class="msg ai"><b>Chatterbox AI:</b> ${data.reply}</div>`;
            input.value = '';
        }
    </script>
</body>
</html>
