<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterbox AI</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #060606; color: white; font-family: sans-serif; }
        #sidebar { width: 200px; background: #111; padding: 20px; border-right: 1px solid #333; }
        .main { flex: 1; display: flex; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; }
        .input-area { padding: 20px; display: flex; background: #060606; }
        input { flex: 1; padding: 15px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; }
        button { padding: 10px 20px; background: white; border-radius: 25px; border: none; margin-left: 10px; cursor: pointer; color: black; font-weight: bold; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 10px; }
        .user { background: #222; text-align: right; }
        .ai { background: #333; text-align: left; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Chatterbox AI</h3>
        <p>Welcome, <span id="displayName"></span></p>
    </div>
    <div class="main">
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask anything...">
            <button onclick="send()">Send</button>
        </div>
    </div>
    <script>
        let userName = localStorage.getItem('userName');
        if(!userName) {
            userName = prompt("Enter your name:");
            localStorage.setItem('userName', userName);
        }
        document.getElementById('displayName').innerText = userName;

        async function send() {
            let input = document.getElementById('userInput');
            let chat = document.getElementById('chat-window');
            if(!input.value) return;
            chat.innerHTML += `<div class="msg user"><b>You:</b> ${input.value}</div>`;
            
            let res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: input.value, name: userName })
            });
            let data = await res.json();
            chat.innerHTML += `<div class="msg ai"><b>AI:</b> ${data.reply}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
