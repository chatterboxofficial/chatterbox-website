
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatterBox AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1020;
color:white;
height:100vh;
}

.app{
display:flex;
flex-direction:column;
height:100vh;
max-width:1000px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#111827;
border-bottom:1px solid #1f2937;
}

.logo{
font-size:22px;
font-weight:bold;
}

.status{
color:#22c55e;
}

#chatBox{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
max-width:80%;
padding:14px;
line-height:1.5;
word-wrap:break-word;
}

.user{
background:linear-gradient(135deg,#2563eb,#7c3aed);
align-self:flex-end;
border-radius:18px 18px 4px 18px;
}

.bot{
background:#1e293b;
align-self:flex-start;
border-radius:18px 18px 18px 4px;
}

.inputArea{
display:flex;
gap:10px;
padding:15px;
background:#111827;
}

input{
flex:1;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:#1f2937;
color:white;
}

button{
padding:14px 20px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="logo">🤖 ChatterBox AI</div>
<div class="status">● Online</div>
</div>

<div id="chatBox">
<div class="msg bot">
Hello! I am ChatterBox AI. How can I help you today?
</div>
</div>

<div class="inputArea">
<input id="userInput" placeholder="Message ChatterBox AI...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
async function sendMessage(){

const input=document.getElementById("userInput");
const text=input.value.trim();

if(!text) return;

const chat=document.getElementById("chatBox");

chat.innerHTML += `
<div class="msg user">${text}</div>
`;

input.value="";

const bot=document.createElement("div");
bot.className="msg bot";
bot.innerText="ChatterBox AI is thinking...";
chat.appendChild(bot);

chat.scrollTop=chat.scrollHeight;

try{

const response=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data=await response.json();

bot.innerText=data.reply;

}catch(e){

bot.innerText="⚠️ ChatterBox AI is currently busy. Please try again later.";

}

chat.scrollTop=chat.scrollHeight;

}

document.getElementById("userInput").addEventListener("keydown",function(e){
if(e.key==="Enter"){
sendMessage();
}
});
</script>

</body>
</html>
