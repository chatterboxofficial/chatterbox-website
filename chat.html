<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-8scale=1.0">
    <title>Chatterbox AI</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #020617; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        /* Sidebar */
        #sidebar { width: 260px; background: #0f172a; padding: 20px; transition: 0.3s; display: flex; flex-direction: column; border-right: 1px solid #1e293b; }
        .hidden { margin-left: -260px; }
        .logo-img { width: 40px; border-radius: 50%; margin-bottom: 20px; }
        
        /* Main Chat */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px; display: flex; align-items: center; gap: 15px; background: #020617; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 85%; }
        .user { align-self: flex-end; background: #2563eb; }
        .ai { align-self: flex-start; background: #1e293b; border: 1px solid #334155; }
        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #1e293b; }
        input { flex: 1; padding: 12px; border-radius: 8px; background: #1e293b; border: 1px solid #334155; color: white; }
        button { padding: 10px 20px; background: #2563eb; border-radius: 8px; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="sidebar">
        <img src="logo.png" class="logo-img">
        <div style="cursor: pointer;" onclick="location.reload()">+ New Chat</div>
    </div>
    <div class="main">
        <div class="header">
            <button onclick="document.getElementById('sidebar').classList.toggle('hidden')">☰</button>
            <span>Chatterbox AI</span>
        </div>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask Chatterbox anything...">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        let userName = localStorage.getItem('userName') || (localStorage.setItem('userName', prompt("Enter your name:") || "User"), localStorage.getItem('userName'));
        async function send() {
            let input = document.getElementById('userInput'), chat = document.getElementById('chat-window');
            if(!input.value) return;
            chat.innerHTML += `<div class="msg user">${input.value}</div>`;
            let msg = input.value; input.value = '';
            
            let res = await fetch('/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, name: userName })
            });
            let data = await res.json();
            chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
