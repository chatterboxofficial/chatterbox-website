
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterbox AI | Modern</title>
    <style>
        body { margin: 0; background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px 20px; border-radius: 20px; max-width: 85%; backdrop-filter: blur(10px); }
        .user { align-self: flex-end; background: rgba(37, 99, 235, 0.9); border-bottom-right-radius: 5px; }
        .ai { align-self: flex-start; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 5px; }
        
        .input-area { background: rgba(15, 23, 42, 0.9); padding: 20px; display: flex; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 15px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; color: white; outline: none; }
        button { padding: 0 25px; background: #3b82f6; border: none; border-radius: 12px; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; transform: scale(1.05); }
        .footer { text-align: center; padding: 10px; font-size: 11px; color: #64748b; }
    </style>
</head>
<body>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask Chatterbox anything...">
        <button onclick="send()">Send</button>
    </div>
    <div class="footer">Powered by Groq | AI Crafted by Aniket</div>

    <script>
        let userName = localStorage.getItem('userName') || (localStorage.setItem('userName', prompt("Enter your name:") || "User"), localStorage.getItem('userName'));
        
        async function send() {
            let input = document.getElementById('userInput'), chat = document.getElementById('chat-window');
            if(!input.value) return;
            chat.innerHTML += `<div class="msg user">${input.value}</div>`;
            let msg = input.value; input.value = '';
            
            let res = await fetch('/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, name: userName })
            });
            let data = await res.json();
            let aiDiv = document.createElement('div');
            aiDiv.className = 'msg ai';
            chat.appendChild(aiDiv);
            
            // Typing Effect
            let text = data.reply, i = 0;
            function type() { if(i < text.length) { aiDiv.innerHTML += text.charAt(i); i++; setTimeout(type, 20); } }
            type();
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
