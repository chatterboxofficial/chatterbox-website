<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterbox AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { padding: 12px 18px; margin: 8px; border-radius: 15px; max-width: 80%; }
        .user { align-self: flex-end; background: #2563eb; }
        .ai { align-self: flex-start; background: #374151; }
        .input-area { padding: 20px; background: #1e293b; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; }
        button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .footer { text-align: center; padding: 10px; font-size: 12px; color: #94a3b8; border-top: 1px solid #334155; }
    </style>
</head>
<body>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message...">
        <button onclick="send()">Send</button>
    </div>
    <div class="footer">Powered by Groq | Created by Aniket</div>

    <script>
        let userName = localStorage.getItem('userName');
        if (!userName) {
            userName = prompt("Welcome to Chatterbox AI! What is your name?");
            localStorage.setItem('userName', userName || "User");
        }

        async function send() {
            let input = document.getElementById('userInput');
            let chat = document.getElementById('chat-window');
            if(!input.value) return;

            chat.innerHTML += `<div class="msg user">${input.value}</div>`;
            let userMsg = input.value;
            input.value = '';

            let res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: userMsg, name: userName })
            });
            let data = await res.json();
            chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
