<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatterBox AI</title>

<style>
body{
background:#07152b;
font-family:Arial,sans-serif;
margin:0;
color:white;
}

.chat-container{
max-width:800px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

#chatBox{
height:70vh;
overflow-y:auto;
border:1px solid #333;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.message{
padding:10px;
margin:10px 0;
border-radius:10px;
}

.user{
background:#0066ff;
text-align:right;
}

.bot{
background:#222;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
}

button{
padding:12px 20px;
border:none;
background:#0066ff;
color:white;
border-radius:8px;
}
</style>
</head>

<body>

<div class="chat-container">

<h1>ChatterBox AI</h1>

<div id="chatBox"></div>

<div class="input-area">
<input id="userInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
async function sendMessage() {

let input = document.getElementById("userInput");
let text = input.value.trim();

if(text === "") return;

let chat = document.getElementById("chatBox");

chat.innerHTML += `
<div class="message user">${text}</div>
`;

input.value = "";

try {

const response = await fetch("/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
message: text
})
});

const data = await response.json();

chat.innerHTML += `
<div class="message bot">${data.reply}</div>
`;

chat.scrollTop = chat.scrollHeight;

} catch(err) {

chat.innerHTML += `
<div class="message bot">
Error connecting to AI
</div>
`;

}

}
</script>

</body>
</html>
